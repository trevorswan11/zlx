name: CI

on:
  push:
    branches: [main, plotting]
    paths:
      - 'src/**'
      - 'libs/**'
      - 'build.zig'
  pull_request:
    branches: ['*']
    paths:
      - 'src/**'
      - 'libs/**'
      - 'build.zig'

permissions:
  contents: read

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxrender-dev \
            libgl1-mesa-dev

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Build Project
        run: zig build

      - name: Run tests (debug)
        run: zig build test

      - name: Run tests (release)
        run: zig build test --release=safe
